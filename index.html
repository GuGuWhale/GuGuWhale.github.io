<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>世界观企划协作站</title>
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { padding: 20px; background: #f6f7f9; }

    /* 导航栏 */
    nav {
      background: #2d3436;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    nav a {
      color: white;
      margin-right: 16px;
      text-decoration: none;
      font-size: 15px;
    }
    nav a:hover { color: #74b9ff; }

    /* 板块 */
    .section {
      background: white;
      padding: 24px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px #0001;
    }
    .section h2 {
      margin-bottom: 16px;
      color: #2d3436;
      border-left: 4px solid #74b9ff;
      padding-left: 10px;
    }

    /* 角色卡片 */
    .role {
      display: flex;
      gap: 20px;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .role img {
      width: 160px;
      height: auto;
      border-radius: 6px;
      object-fit: cover;
    }
    .role-info { flex: 1; }
    .role-info p { margin: 6px 0; line-height: 1.6; }

    /* 音乐 */
    .music {
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 6px;
      margin: 8px 0;
    }
  </style>
</head>

<body>

<!-- 导航：所有页面跳转 -->
<nav>
  <a href="#roles">角色档案</a>
  <a href="#world">世界观设定</a>
  <a href="#story">主线剧情</a>
  <a href="#music">音乐库</a>
</nav>

<!-- 角色档案 -->
<section id="roles" class="section">
  <h2>角色档案</h2>

  <div class="role">
    <img src="char1.jpg" alt="角色立绘">
    <div class="role-info">
      <h3>角色姓名</h3>
      <p><strong>身份：</strong>示例身份</p>
      <p><strong>种族：</strong>示例种族</p>
      <p><strong>背景故事：</strong>文案组在这里写内容</p>
      <p><strong>剧情：</strong>对应主线章节</p>
    </div>
  </div>
</section>

<!-- 世界观设定 -->
<section id="world" class="section">
  <h2>世界观设定</h2>
  <p><strong>等级体系：</strong>填写</p>
  <p><strong>政治架构：</strong>填写</p>
  <<p><strong>国家势力：</strong>填写</p>
  <p><strong>重大历史事件：</strong>填写</p>
</section>

<!-- 主线剧情 -->
<section id="story" class="section">
  <h2>主线剧情</h2>
  <h3>第一卷</h3>
  <p>在这里写剧情……</p>
</section>

<!-- 音乐库 -->
<section id="music" class="section">
  <h2>原创配乐</h2>
  <div class="music">
    <p>世界观主题曲</p>
    <audio controls src="bgm.mp3">
  </div>
</section>

</body>
</html>
